<h2 class="book-brand">
  <a class="flex align-center" href="{{ partial "docs/links/home" . }}">
    {{- with .Site.Params.BookLogo -}}
    <img src="{{ . | relURL }}" alt="{{ partial "docs/text/i18n" "Logo" }}" />
    {{- end -}}
    <span class="book-brand-text">
      <span class="book-brand-title">{{ default .Site.Title .Site.Params.BookBrandTitle }}</span>
      {{- with .Site.Params.BookBrandSubtitle -}}
      <span class="book-brand-subtitle">{{ . }}</span>
      {{- end -}}
    </span>
  </a>
</h2>
